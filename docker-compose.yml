services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lucap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lucap_pass}
      POSTGRES_DB: ${POSTGRES_DB:-lucap}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/18/docker
    networks:
      - lucap-net

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"    # S3 API
      - "9001:9001"    # Console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lucap-net

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: ["/bin/sh", "-c"]
    command: |
      set -e
      until mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}; do sleep 1; done
      mc mb --ignore-existing local/lucap-clients
      mc mb --ignore-existing local/lucap-sandbox
      # Apply lifecycle to sandbox: remove objects older than 30 days
      cat /etc/minio/lifecycle-sandbox.json | mc ilm import local/lucap-sandbox || true
      echo "MinIO buckets created"
    volumes:
      - ./infra/minio-lifecycle.json:/etc/minio/lifecycle-sandbox.json:ro
    networks:
      - lucap-net

  clamav:
    image: mkodockx/docker-clamav:latest
    restart: unless-stopped
    ports:
      - "3310:3310"
    networks:
      - lucap-net

  nginx:
    image: nginx:latest
    depends_on:
      - web
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - lucap-net

volumes:
  pgdata:
  minio-data:

networks:
  lucap-net:
    driver: bridge
