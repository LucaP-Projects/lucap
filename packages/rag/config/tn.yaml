country_code: TN
name: Tunisia

# ── TN covers all 14 sectors via jibaya.tn (tax) + JORT (everything published) ──
# JORT documents are auto-tagged by sector at chunk time via keyword matching.
# As we add more crawlers (CNSS, legislation.tn, etc.), add them here.

crawlers:
  # Tax codes, notes communes, lois de finances, conventions fiscales
  - type: jibaya
    manifest: config/jibaya_docs_data.json

  # All laws, decrees, announcements published chronologically
  - type: jort
    collections:
      - journal-officiel
      - annonces-legales
      - tribunal-immobilier
